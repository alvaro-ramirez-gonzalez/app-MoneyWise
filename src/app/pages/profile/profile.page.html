<ion-content>
  <div class="profile-header">
    <div class="avatar-wrapper">
      <div class="avatar-circle">
        {{ user?.name?.charAt(0) || 'U' }}
      </div>
      <div class="edit-badge">
        <ion-icon name="camera"></ion-icon>
      </div>
    </div>
    <h2>{{ user?.name || 'Usuario' }}</h2>
    <p>{{ user?.email || 'correo@ejemplo.com' }}</p>
  </div>

  <div class="profile-body">
    
    <div class="section-card">
      <h3>Cuenta</h3>
      <ion-item lines="none" class="profile-item">
        <div class="icon-box blue" slot="start">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <ion-label>
          <span>Nombre</span>
          <p>{{ user?.name }}</p>
        </ion-label>
      </ion-item>

      <ion-item lines="none" class="profile-item">
        <div class="icon-box green" slot="start">
          <ion-icon name="mail-outline"></ion-icon>
        </div>
        <ion-label>
          <span>Email</span>
          <p>{{ user?.email }}</p>
        </ion-label>
      </ion-item>
    </div>

    <div class="section-card">
      <h3>Preferencias</h3>
      <ion-item lines="none" class="profile-item" button detail="true">
        <div class="icon-box gray" slot="start">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <ion-label>Notificaciones</ion-label>
      </ion-item>

      <ion-item lines="none" class="profile-item" button detail="true">
        <div class="icon-box gray" slot="start">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <ion-label>Seguridad</ion-label>
      </ion-item>
    </div>

    <div class="logout-container">
      <ion-button expand="block" fill="clear" color="danger" (click)="logout()">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        Cerrar Sesión
      </ion-button>
    </div>
  </div>
</ion-content>
