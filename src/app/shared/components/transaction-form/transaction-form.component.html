<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ transaccion.id ? 'Editar' : 'Nueva' }} Movimiento</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancelar()">X</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-segment [(ngModel)]="transaccion.type" class="ion-margin-bottom">
    <ion-segment-button value="income">
      <ion-label>Ingreso</ion-label>
    </ion-segment-button>
    <ion-segment-button value="expense">
      <ion-label>Gasto</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list lines="inset">
    <ion-item>
      <ion-label position="stacked">Monto ($)</ion-label>
      <ion-input type="number" [(ngModel)]="transaccion.amount" placeholder="0.00"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Categoría</ion-label>
      <ion-select [(ngModel)]="transaccion.category" placeholder="Selecciona una">
        <ion-select-option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Fecha</ion-label>
      <ion-datetime-button datetime="date"></ion-datetime-button>
      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime id="date" presentation="date" [(ngModel)]="transaccion.date"></ion-datetime>
        </ng-template>
      </ion-modal>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Descripción (Opcional)</ion-label>
      <ion-textarea [(ngModel)]="transaccion.description" placeholder="Ej. Pago de arriendo"></ion-textarea>
    </ion-item>
  </ion-list>

  <ion-button expand="block" (click)="confirmar()" [disabled]="!transaccion.amount || !transaccion.category" class="ion-margin-top">
    Guardar Transacción
  </ion-button>
</ion-content>
